<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Out of Bounds</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@300;400;600&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="icon" href="main-res/RZbrand.ico">

  <style>
    /* --- Theme Variables --- */
    :root {
      --accent-yellow: #D48C1C;
      --blue-1: #0B1120;
      --blue-2: #131B2E;
      --blue-3: #1A253D;
    }

    /* --- Base Reset & Body --- */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      background: linear-gradient(180deg, var(--blue-1) 0%, var(--blue-2) 100%);
      font-family: 'Poppins', sans-serif;
      color: white;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    .fredoka {
      font-family: 'Fredoka One', cursive;
    }

    /* --- Dynamic Clouds Background --- */
    .clouds-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* CSS Cloud Shape */
    .cloud {
      width: 300px;
      height: 100px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 100px;
      position: absolute;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 -10px 20px rgba(255, 255, 255, 0.02);
      animation: drift linear infinite;
      opacity: 0;
      /* Starts hidden to fade in via animation */
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      box-shadow: inset 0 -10px 20px rgba(255, 255, 255, 0.02);
    }

    .cloud::before {
      width: 130px;
      height: 130px;
      top: -50px;
      left: 40px;
    }

    .cloud::after {
      width: 160px;
      height: 160px;
      top: -70px;
      right: 40px;
    }

    /* Cloud Variations */
    .c1 {
      top: 15%;
      animation-duration: 35s;
      animation-delay: 0s;
      transform: scale(1.2);
    }

    .c2 {
      top: 45%;
      animation-duration: 45s;
      animation-delay: -10s;
      transform: scale(0.8);
      opacity: 0.5;
    }

    .c3 {
      top: 75%;
      animation-duration: 28s;
      animation-delay: -5s;
      transform: scale(1.5);
    }

    .c4 {
      top: 25%;
      animation-duration: 50s;
      animation-delay: -25s;
      transform: scale(0.6);
    }

    @keyframes drift {
      0% {
        left: -400px;
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        left: 100vw;
        opacity: 0;
      }
    }

    /* --- 404 Main Content --- */
    .error-content {
      position: relative;
      z-index: 10;
      text-align: center;
      animation: fadeIn 1s ease-out forwards;
    }

    /* Glowing 404 Text & Moon */
    .error-code {
      font-size: clamp(8rem, 15vw, 15rem);
      line-height: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(10px, 3vw, 30px);
      margin-bottom: 20px;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .moon {
      width: clamp(100px, 12vw, 180px);
      height: clamp(100px, 12vw, 180px);
      background: var(--accent-yellow);
      border-radius: 50%;
      box-shadow: 0 0 50px rgba(212, 140, 28, 0.6), inset -20px -20px 0 rgba(0, 0, 0, 0.15);
      animation: float 4s ease-in-out infinite;
    }

    .error-title {
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      margin-bottom: 10px;
    }

    .error-subtitle {
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      margin-bottom: 40px;
    }

    /* --- Custom Explore Button --- */
    .btn-explore {
      background-color: var(--accent-yellow) !important;
      color: #101A30 !important;
      font-family: 'Fredoka One', cursive;
      border: none;
      padding: 15px 40px;
      font-size: 1.1rem;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .btn-explore:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(212, 140, 28, 0.4);
      color: #101A30 !important;
    }

    /* --- Animations --- */
    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-15px);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="clouds-container">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="cloud c4"></div>
  </div>

  <div class="error-content px-3">
    <h1 class="error-code fredoka">
      <span>4</span>
      <div class="moon"></div>
      <span>4</span>
    </h1>

    <h2 class="error-title fredoka">Lost in the Clouds?</h2>
    <p class="error-subtitle opacity-75">Looks like you've drifted out of bounds.</p>

    <a href="index.html" class="btn btn-explore rounded-pill">
      <i class="bi bi-compass me-2"></i> Guide Me Home
    </a>
  </div>

</body>

</html>
