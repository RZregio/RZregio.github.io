<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meowtivator Chat</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <link rel="icon" href="res/RZbrand.ico">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@300;400;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="chat-container">

    <div class="chat-hero d-none d-lg-flex flex-column align-items-center justify-content-center">
      <img src="res/CatBotBig.png" class="hero-cat-img" alt="Meowtivator Mascot" onerror="this.src='res/CatBot.png'">
      <h2 class="fredoka text-white mt-4">MEOWTIVATOR</h2>
      <p class="text-white opacity-75">A gentle meow to lift your spirit.</p>
    </div>

    <div class="chat-interface">
      <div class="chat-box" id="chatBox">
      </div>

      <div class="chat-input-area">
        <input type="text" id="userInput" class="form-control chat-input" placeholder="Type your message here..."
          autocomplete="off">
        <button id="sendBtn" class="btn chat-send-btn">
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
    </div>

  </div>

  <script src="js/chat.js"></script>
</body>

</html>
