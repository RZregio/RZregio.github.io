<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; font-family: sans-serif; }
        .card { border: none; border-radius: 8px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-solid { background-color: #0056b3; color: #ffffff; border: none; padding: 12px; font-weight: 600; }
        .btn-solid:hover { background-color: #004494; color: #ffffff; }
        .header-title { color: #212529; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 card p-4">
                <h4 class="text-center mb-4 header-title">Print Queue Submission</h4>
                <form id="printForm" action="php/upload.php" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label text-dark">Requester Name</label>
                        <input type="text" class="form-control" name="requester" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-dark">Document (PDF only)</label>
                        <input type="file" class="form-control" name="document" accept="application/pdf" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-4">
                            <label class="form-label text-dark">Copies</label>
                            <input type="number" class="form-control" name="copies" value="1" min="1" required>
                        </div>
                        <div class="col-6 mb-4">
                            <label class="form-label text-dark">Color Mode</label>
                            <select class="form-select" name="color">
                                <option value="Black & White">Black & White</option>
                                <option value="Colored">Colored</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-solid w-100">Send to Queue</button>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="statusModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-5">
                <h5 id="modalText" class="header-title">Setting up your document...</h5>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
